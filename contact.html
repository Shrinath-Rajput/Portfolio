<style>

body{
background:#0f1115;
color:white;
font-family:Arial;
}

/* section */

.contact-section{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

}

/* card */

.contact-box{

background:#151922;

padding:40px;

border-radius:15px;

width:500px;

text-align:center;

box-shadow:0 0 25px rgba(0,255,255,0.15);

}

/* heading */

.contact-title{

font-size:32px;

color:#00eaff;

margin-bottom:10px;

}

.contact-sub{

color:#aaa;

margin-bottom:25px;

}

/* icons */

.social-icons{

margin-bottom:25px;

}

.social-icons a{

display:inline-flex;

align-items:center;

justify-content:center;

width:45px;

height:45px;

margin:6px;

border-radius:50%;

background:#0f1115;

color:white;

font-size:18px;

text-decoration:none;

transition:0.3s;

}

.social-icons a:hover{

background:#00eaff;

color:black;

transform:scale(1.1);

}

/* inputs */

.form-control{

background:#0f1115;

border:none;

color:white;

margin-bottom:15px;

}

.form-control:focus{

box-shadow:0 0 10px #00eaff;

background:#0f1115;

color:white;

}

/* button */

.send-btn{

background:#007bff;

border:none;

width:100%;

padding:12px;

color:white;

border-radius:6px;

transition:0.3s;

}

.send-btn:hover{

background:#00eaff;

color:black;




}

</style>
